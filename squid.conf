# Define the port Squid will listen on
http_port 6969

# ACLs for allowed ports and methods
acl SSL_ports port 443
acl Safe_ports port 80          # http
acl Safe_ports port 443         # https
acl CONNECT method CONNECT

# ACL for your VPS and target domains
acl vps_client src 185.187.169.230/32 194.5.152.243/32
acl target_domain dstdomain .zizcon.cz api.ipify.org

# Basic access rules
http_access deny !Safe_ports

# Allow CONNECT for SSL ports
http_access allow CONNECT SSL_ports
http_access deny CONNECT !SSL_ports

# Allow VPS client to access target domains
http_access allow vps_client target_domain
http_access deny all

# Forward all traffic through Tor
never_direct allow all
cache_peer 127.0.0.1 parent 9050 0 no-query default
cache_peer_access 127.0.0.1 allow all

# Performance settings
dns_nameservers 8.8.8.8 8.8.4.4
forwarded_for off
via off
request_header_access X-Forwarded-For deny all
request_header_access Via deny all
request_header_access Cache-Control deny all

# SSL Bump configuration for HTTPS
ssl_bump server-first all
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 4MB
sslcrtd_children 5
sslproxy_cert_error deny all

# Memory and disk cache settings
cache_mem 256 MB
maximum_object_size 10 MB
cache_dir ufs /var/spool/squid 1000 16 256

# Logging
access_log /var/log/squid/access.log combined
cache_log /var/log/squid/cache.log
cache_store_log /var/log/squid/store.log

# Miscellaneous settings
visible_hostname squid-proxy
coredump_dir /var/spool/squid

# Refresh patterns
refresh_pattern ^ftp:           1440    20%     10080
refresh_pattern ^gopher:        1440    0%      1440
refresh_pattern -i (/cgi-bin/|\?) 0     0%      0
refresh_pattern .               0       20%     4320 